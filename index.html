document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d',sans-serif; font-weight:700; font-size:clamp(22px,2.6vw,30px); margin:0 0 6px; text-transform:uppercase; letter-spacing:.01em;\">Documentos e formulários<\u002Fh2>\n      <p style=\"margin:0 0 18px; max-width:640px; color:#57554F; font-size:15px; line-height:1.55;\">Requerimentos, termos, formulários e legislação técnica oficiais. Os arquivos são mantidos no site do CBMPE e abrem em nova aba.<\u002Fp>\n\n      <div class=\"cat-cards\" style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;\">\n        <sc-for list=\"{{ docs }}\" as=\"d\" hint-placeholder-count=\"2\">\n          <a href=\"{{ d.href }}\" target=\"_blank\" rel=\"noopener\" class=\"cat-doc-card\" style=\"display:flex; align-items:center; gap:15px; background:#fff; border:1px solid #E5E0D5; border-radius:14px; padding:16px 17px; box-shadow:0 6px 20px -16px rgba(20,32,74,.5);\" style-hover=\"border-color:#C1121F;\">\n            <span style=\"width:46px; height:46px; flex:0 0 auto; border-radius:10px; background:{{ d.accent }}; color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-weight:700; font-size:12px; letter-spacing:.04em;\">{{ d.kind }}<\u002Fspan>\n            <span style=\"display:flex; flex-direction:column; gap:3px; min-width:0;\">\n              <span style=\"font-family:'Oswald',sans-serif; font-weight:600; font-size:17px; line-height:1.2; color:#1C1B19; text-transform:uppercase; letter-spacing:.01em;\">{{ d.title }}<\u002Fspan>\n              <span style=\"font-size:13px; line-height:1.45; color:#6B6A66;\">{{ d.desc }}<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"margin-left:auto; flex:0 0 auto; color:#C1121F; font-size:22px; font-weight:700; padding-left:6px;\">›<\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section style=\"margin-bottom:26px;\">\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px; flex-wrap:wrap;\">\n        <span style=\"font-family:'Oswald',sans-serif; font-weight:600; font-size:12px; letter-spacing:.2em; color:#C1121F; text-transform:uppercase;\">Onde nos encontrar<\u002Fspan>\n        <span style=\"height:1px; flex:1; min-width:40px; background:#DDD6CA;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Oswald',sans-serif; font-weight:700; font-size:clamp(22px,2.6vw,30px); margin:0 0 4px; text-transform:uppercase; letter-spacing:.01em;\">SATECs e Postos de Atendimento<\u002Fh2>\n\n      <div style=\"display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:10px 0 18px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:7px; background:#14204A; color:#fff; font-family:'Oswald',sans-serif; font-weight:600; font-size:12px; letter-spacing:.14em; text-transform:uppercase; padding:6px 12px; border-radius:6px;\">Região · CAT Sertão<\u002Fspan>\n        <span style=\"display:inline-flex; align-items:center; gap:7px; background:#FBF3D6; color:#8a6a00; border:1px solid #F0DFA0; font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:6px;\">Todos os telefones atendem somente por WhatsApp<\u002Fspan>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showFilter }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"margin-bottom:20px;\">\n          <div class=\"cat-filter-row\" style=\"display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n            <input value=\"{{ query }}\" sc-camel-on-input=\"{{ onQuery }}\" placeholder=\"Digite seu município (ex: Cabrobó, Buíque, Exu)…\" style=\"flex:1; min-width:240px; max-width:440px; font-family:'Public Sans',sans-serif; font-size:14.5px; padding:11px 15px; border:1px solid #D8D1C3; border-radius:10px; background:#fff; outline:none; color:#1C1B19;\">\n            <span style=\"font-size:13px; color:#78766F; font-weight:500;\">{{ count }} unidade(s)<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8C8A83; margin-top:8px;\">Busque pelo nome do município para descobrir qual SATEC o atende. Também é possível buscar por cidade-sede, SATEC ou responsável.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ hasResults }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"cat-cards\" style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px;\">\n          <sc-for list=\"{{ satecs }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex; flex-direction:column; background:#fff; border:1px solid #E5E0D5; border-radius:16px; overflow:hidden; box-shadow:0 6px 20px -16px rgba(20,32,74,.5);\">\n              <div style=\"height:5px; background:{{ s.accent }};\"><\u002Fdiv>\n              <div style=\"padding:18px 18px 16px; display:flex; flex-direction:column; gap:13px; flex:1;\">\n\n                <div style=\"display:flex; align-items:flex-start; gap:11px;\">\n                  <span style=\"font-family:'Oswald',sans-serif; font-weight:700; font-size:12px; letter-spacing:.08em; color:#fff; background:{{ s.accent }}; padding:6px 10px; border-radius:6px; white-space:nowrap; text-transform:uppercase; margin-top:2px;\">{{ s.tag }}<\u002Fspan>\n                  <div style=\"min-width:0;\">\n                    <div style=\"font-family:'Oswald',sans-serif; font-weight:600; font-size:19px; line-height:1.15; text-transform:uppercase; letter-spacing:.01em;\">{{ s.city }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"display:flex; flex-direction:column; gap:7px;\">\n                  <sc-for list=\"{{ s.addresses }}\" as=\"addr\" hint-placeholder-count=\"1\">\n                    <div style=\"display:flex; gap:9px; align-items:flex-start;\">\n                      <span style=\"width:7px; height:7px; border-radius:2px; background:#C1121F; flex:0 0 auto; margin-top:6px;\"><\u002Fspan>\n                      <span style=\"font-size:13.5px; line-height:1.5; color:#4B4943;\">{{ addr }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <div style=\"display:flex; flex-direction:column; gap:5px; padding-top:2px; border-top:1px dashed #E7E1D5; margin-top:auto;\">\n                  <sc-if value=\"{{ s.hasContact }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"font-size:13px; color:#57554F;\"><span style=\"color:#8C8A83;\">Responsável:<\u002Fspan> <strong style=\"color:#1C1B19;\">{{ s.contact }}<\u002Fstrong><\u002Fdiv>\n                  <\u002Fsc-if>\n                  <div style=\"font-size:12.5px; color:#78766F;\">{{ s.mode }}<\u002Fdiv>\n                  <sc-if value=\"{{ s.hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-size:12.5px; color:#8a6a00; background:#FBF3D6; border:1px solid #F0DFA0; padding:6px 9px; border-radius:6px;\">{{ s.note }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <div style=\"display:flex; flex-direction:column; gap:8px;\">\n                  <div style=\"font-family:'Oswald',sans-serif; font-weight:600; font-size:11px; letter-spacing:.12em; color:#8C8A83; text-transform:uppercase;\">Municípios atendidos · {{ s.municipiosCount }}<\u002Fdiv>\n                  <div style=\"display:flex; flex-wrap:wrap; gap:5px;\">\n                    <sc-for list=\"{{ s.municipios }}\" as=\"m\" hint-placeholder-count=\"4\">\n                      <span style=\"font-size:11.5px; color:#4B4943; background:#F4F1EA; border:1px solid #E6E0D4; padding:3px 8px; border-radius:5px; line-height:1.3;\">{{ m }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <a href=\"{{ s.wa }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex; align-items:center; justify-content:center; gap:9px; background:#1E8E4E; color:#fff; font-weight:700; font-size:14px; padding:11px; border-radius:10px; letter-spacing:.01em;\" style-hover=\"background:#177a41;\">\n                  <span style=\"width:9px; height:9px; border-radius:50%; background:#7DE6A5;\"><\u002Fspan>WhatsApp · {{ s.phone }}\n                <\u002Fa>\n\n                <a href=\"{{ s.mapUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex; align-items:center; justify-content:center; gap:9px; background:#fff; color:#C1121F; border:1.5px solid #C1121F; font-weight:700; font-size:14px; padding:9.5px; border-radius:10px; letter-spacing:.01em;\" style-hover=\"background:#C1121F; color:#fff;\">\n                  <span style=\"width:9px; height:9px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); background:#C1121F; flex:0 0 auto; border:2px solid #C1121F;\"><\u002Fspan>Ver no mapa\n                <\u002Fa>\n\n                <sc-if value=\"{{ s.hasEmail }}\" hint-placeholder-val=\"{{ false }}\">\n                  <a href=\"{{ s.mailto }}\" style=\"display:flex; align-items:center; justify-content:center; gap:9px; background:#fff; color:#14204A; border:1.5px solid #14204A; font-weight:700; font-size:14px; padding:9.5px; border-radius:10px; letter-spacing:.01em; word-break:break-all; text-align:center;\" style-hover=\"background:#14204A; color:#fff;\">\n                    <span style=\"width:9px; height:9px; border-radius:2px; background:#C1121F; flex:0 0 auto;\"><\u002Fspan>E-mail · {{ s.email }}\n                  <\u002Fa>\n                <\u002Fsc-if>\n\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ empty }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center; padding:48px 20px; color:#8C8A83; font-size:15px; background:#fff; border:1px dashed #DDD6CA; border-radius:14px;\">Nenhuma unidade encontrada para “{{ query }}”.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n  <footer style=\"background:#14204A; color:#c8cde0; margin-top:20px;\">\n    <div class=\"cat-pad-x cat-footer-inner\" style=\"max-width:1180px; margin:0 auto; padding:22px 28px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; font-size:13px;\">\n      <img src=\"5a2a0ddc-cafb-4bbb-86fa-a63115f783e3\" alt=\"\" style=\"width:38px; height:38px; object-fit:contain; background:#fff; border-radius:8px; padding:3px;\">\n      <div style=\"line-height:1.5;\">\n        <div style=\"font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.06em; color:#fff; text-transform:uppercase; font-size:13px;\">CAT Sertão — CBMPE<\u002Fdiv>\n        <div>Centro de Atividades Técnicas do Sertão · Uso interno da corporação<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cat-footer-copy\" style=\"margin-left:auto; color:#8f96b3;\">© {{ year }} Corpo de Bombeiros Militar de Pernambuco<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;chatHeight&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:520,&quot;min&quot;:440,&quot;max&quot;:820,&quot;step&quot;:20,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Chatbot&quot;},&quot;showFilter&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Contatos&quot;}}\">\nclass Component extends DCLogic {\n  state = { query: '', username: '', password: '', error: '', loggedIn: false };\n\n  componentDidMount() {\n    try {\n      if (sessionStorage.getItem('cat_auth') === '1') {\n        this.setState({ loggedIn: true }, () => this.maybeInitChat());\n        return;\n      }\n    } catch (e) {}\n  }\n\n  componentDidUpdate() {\n    this.maybeInitChat();\n  }\n\n  maybeInitChat() {\n    if (this._chatInit) return;\n    if (!this.state.loggedIn) return;\n    if (!document.getElementById('n8n-chat')) return;\n    this._chatInit = true;\n    import('https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js')\n      .then(({ createChat }) => {\n        createChat({\n          webhookUrl: 'https://sternplatypus-n8n.cloudfy.live/webhook/ac8fae67-dc53-436e-981b-32751a37a991/chat',\n          target: '#n8n-chat',\n          mode: 'fullscreen',\n          showWelcomeScreen: false,\n          loadPreviousSession: true,\n          initialMessages: [\n            'Olá! 👋',\n            'Sou o assistente do CAT Sertão. Em que posso ajudar você hoje?'\n          ],\n          i18n: {\n            en: {\n              title: 'Assistente do CAT Sertão',\n              subtitle: 'Atendimento automático — pergunte à vontade.',\n              footer: '',\n              getStarted: 'Nova conversa',\n              inputPlaceholder: 'Digite sua mensagem…',\n              closeButtonTooltip: 'Fechar'\n            }\n          }\n        });\n      })\n      .catch((e) => console.error('Falha ao carregar o chat n8n:', e));\n  }\n\n  handleLogin = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    const u = (this.state.username || '').trim().toLowerCase();\n    const p = this.state.password || '';\n    if (u === 'catsertao' && p === 'satecpetrolina') {\n      try { sessionStorage.setItem('cat_auth', '1'); } catch (err) {}\n      this.setState({ loggedIn: true, error: '', password: '' });\n    } else {\n      this.setState({ error: 'Usuário ou senha incorretos.' });\n    }\n  };\n\n  handleLogout = () => {\n    try { sessionStorage.removeItem('cat_auth'); } catch (err) {}\n    this._chatInit = false;\n    this.setState({ loggedIn: false, username: '', password: '', error: '' });\n  };\n\n  renderVals() {\n    const raw = [\n      { type: 'SATEC', tag: '1ª SATEC', city: 'Salgueiro',\n        addresses: ['Rua João Veras de Siqueira, SN — Nossa Sra. Aparecida · CEP 56000-000'],\n        contact: '', mode: 'Presencial e WhatsApp', phone: '(87) 9.8877-2496', num: '5587988772496',\n        municipios: ['Salgueiro', 'Cedro', 'Mirandiba', 'Parnamirim', 'Serrita', 'Terra Nova', 'Verdejante'] },\n      { type: 'SATEC', tag: '2ª SATEC', city: 'Petrolina',\n        addresses: ['Av. Monsenhor Ângelo Sampaio, 100 — Expresso Cidadão River Shopping, Centro · CEP 56328-000'],\n        contact: '', mode: 'Presencial e WhatsApp', email: 'catsertao2@bombeiros.pe.gov.br', phone: '(87) 9.8835-2828', num: '5587988352828',\n        municipios: ['Petrolina', 'Afrânio', 'Cabrobó', 'Dormentes', 'Lagoa Grande', 'Orocó', 'Santa Maria da Boa Vista'] },\n      { type: 'SATEC', tag: '3ª SATEC', city: 'Serra Talhada',\n        addresses: ['Av. Vicente Inácio de Oliveira, SN — Alto Bom Jesus · CEP 56906-000'],\n        contact: '', mode: 'Presencial e WhatsApp', phone: '(87) 9.8877-2495', num: '5587988772495',\n        municipios: ['Serra Talhada', 'Flores', 'Santa Cruz da Baixa Verde', 'Betânia', 'Calumbi', 'São José do Belmonte', 'Triunfo', 'Afogados da Ingazeira', 'Brejinho', 'Carnaíba', 'Quixaba', 'Solidão', 'Tabira', 'Santa Terezinha', 'São José do Egito', 'Itapetim', 'Tuparetama', 'Ingazeira', 'Iguaracy', 'Petrolândia', 'Belém de São Francisco', 'Carnaubeira da Penha', 'Inajá', 'Itacuruba', 'Jatobá', 'Tacaratu', 'Floresta'] },\n      { type: 'Posto', tag: 'Posto', city: 'Petrolândia',\n        addresses: ['Av. Auspício Valgueiro Barros, 41 — Centro · CEP 56460-000'],\n        contact: '', mode: 'Presencial e WhatsApp', phone: '(87) 9.8877-0198', num: '5587988770198',\n        municipios: ['Petrolândia'] },\n      { type: 'Posto', tag: 'Posto', city: 'Afogados da Ingazeira',\n        addresses: ['Rua José de Sá Maranhão, SN — São Francisco · CEP 56800-000'],\n        contact: '', mode: 'Presencial e WhatsApp', phone: '(87) 9.8877-0200', num: '5587988770200',\n        municipios: ['Afogados da Ingazeira'] },\n      { type: 'SATEC', tag: '4ª SATEC', city: 'Arcoverde',\n        addresses: ['Rua Augusto Cavalcanti, S/N — Centro · CEP 56506-640'],\n        contact: '', mode: 'Presencial e WhatsApp', phone: '(87) 9.8877-2518', num: '5587988772518',\n        municipios: ['Arcoverde', 'Pedra', 'Venturosa', 'Buíque', 'Tupanatinga', 'Itaíba', 'Sertânia', 'Custódia', 'Ibimirim', 'Manari', 'Pesqueira', 'Alagoinha', 'Sanharó', 'Poção'] },\n      { type: 'SATEC', tag: '5ª SATEC', city: 'Araripina / Ouricuri',\n        addresses: [\n          'Av. Florentino Alves Batista, 253 — Centro (próx. terminal rodoviário), Araripina',\n          'Rua Antônio Lino Ferreira, 074 — Centro · CEP 56200-000, Ouricuri'\n        ],\n        contact: '', mode: 'Atendimento somente via WhatsApp', phone: '(87) 9.8835-2828', num: '5587988352828',\n        note: 'WhatsApp atendido pela 2ª SATEC (Petrolina).',\n        municipios: ['Araripina', 'Ouricuri', 'Trindade', 'Ipubi', 'Santa Cruz', 'Santa Filomena', 'Bodocó', 'Granito', 'Moreilândia', 'Exu'] }\n    ];\n\n    const all = raw.map((s) => ({\n      ...s,\n      accent: s.type === 'SATEC' ? '#C1121F' : '#1B2A5B',\n      hasContact: !!(s.contact && s.contact.trim()),\n      hasEmail: true,\n      email: 'catsertao2cbmpe@gmail.com',\n      hasNote: !!s.note,\n      mailto: 'mailto:catsertao2cbmpe@gmail.com',\n      wa: 'https://wa.me/' + s.num,\n      mapUrl: 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.addresses[0].split('·')[0].trim() + ', ' + s.city.split('/')[0].trim() + ' - PE'),\n      municipios: s.municipios || [],\n      municipiosCount: (s.municipios || []).length\n    }));\n\n    all.sort((a, b) => (a.type === 'Posto' ? 1 : 0) - (b.type === 'Posto' ? 1 : 0));\n\n    const docs = [\n      { title: 'Termos e Requerimentos', desc: 'Requerimentos, termos e formulários oficiais para abertura e andamento de processos.', kind: 'LINK', href: 'https://www.bombeiros.pe.gov.br/index.php/documentos-para-baixar/termos-e-requerimentos' },\n      { title: 'Legislações Técnicas', desc: 'Decretos, portarias e normas técnicas aplicáveis às atividades do CAT.', kind: 'LINK', href: 'https://www.bombeiros.pe.gov.br/index.php/documentos-para-baixar/legislacoes-tecnicas' }\n    ].map((d) => ({ ...d, accent: d.kind === 'LINK' ? '#1B2A5B' : '#C1121F' }));\n\n    const q = this.state.query.trim().toLowerCase();\n    const filtered = q\n      ? all.filter((s) => (s.city + ' ' + s.tag + ' ' + s.contact + ' ' + (s.municipios || []).join(' ')).toLowerCase().includes(q))\n      : all;\n\n    return {\n      satecs: filtered,\n      query: this.state.query,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      count: filtered.length,\n      docs: docs,\n      hasResults: filtered.length > 0,\n      empty: filtered.length === 0,\n      chatHeightPx: (this.props.chatHeight ?? 600) + 'px',\n      showFilter: this.props.showFilter ?? true,\n      year: new Date().getFullYear(),\n      loggedIn: this.state.loggedIn,\n      notLoggedIn: !this.state.loggedIn,\n      username: this.state.username,\n      password: this.state.password,\n      error: this.state.error,\n      hasError: !!this.state.error,\n      onUser: (e) => this.setState({ username: e.target.value }),\n      onPass: (e) => this.setState({ password: e.target.value }),\n      onSubmit: this.handleLogin,\n      onLogout: this.handleLogout\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
  <script>
  document.title = "CAT Sertão — CBMPE";
  window.addEventListener('load', function () {
    document.title = "CAT Sertão — CBMPE";
